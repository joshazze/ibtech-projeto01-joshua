<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" shape-rendering="crispEdges" width="240" height="288">
  <title>Polaroide pixelada de um céu noturno com constelações, lua crescente e um telescópio em silhueta no canto.</title>
  <!-- frame -->
  <rect width="80" height="96" fill="#f5ecd9"/>
  <rect x="4" y="4" width="72" height="72" fill="#0a0e2a"/>
  <!-- gradient bands (deep night to dawn) -->
  <rect x="4" y="4"  width="72" height="20" fill="#050b1f"/>
  <rect x="4" y="24" width="72" height="20" fill="#0f1f3d"/>
  <rect x="4" y="44" width="72" height="20" fill="#1e2a4d"/>
  <!-- horizon (mountains in silhouette) -->
  <polygon points="4,76 16,64 28,76" fill="#0a0a0a"/>
  <polygon points="22,76 38,60 56,76" fill="#0a0a0a"/>
  <polygon points="48,76 64,62 76,76" fill="#0a0a0a"/>
  <!-- moon crescent -->
  <rect x="58" y="10" width="12" height="12" fill="#fde68a"/>
  <rect x="62" y="10" width="8"  height="12" fill="#0f1f3d"/>
  <rect x="60" y="12" width="2"  height="8"  fill="#fde68a"/>
  <!-- many stars -->
  <rect x="10" y="8"  width="2" height="2" fill="#ffffff"/>
  <rect x="22" y="14" width="2" height="2" fill="#ffffff"/>
  <rect x="34" y="6"  width="2" height="2" fill="#ffffff"/>
  <rect x="46" y="12" width="2" height="2" fill="#ffffff"/>
  <rect x="50" y="22" width="2" height="2" fill="#ffffff"/>
  <rect x="14" y="24" width="2" height="2" fill="#ffffff"/>
  <rect x="28" y="22" width="2" height="2" fill="#ffffff"/>
  <rect x="40" y="28" width="2" height="2" fill="#ffffff"/>
  <rect x="52" y="32" width="2" height="2" fill="#ffffff"/>
  <rect x="8"  y="34" width="2" height="2" fill="#ffffff"/>
  <rect x="18" y="40" width="2" height="2" fill="#ffffff"/>
  <rect x="30" y="38" width="2" height="2" fill="#ffffff"/>
  <rect x="44" y="42" width="2" height="2" fill="#ffffff"/>
  <rect x="58" y="40" width="2" height="2" fill="#ffffff"/>
  <rect x="68" y="32" width="2" height="2" fill="#ffffff"/>
  <rect x="6"  y="48" width="2" height="2" fill="#ffffff"/>
  <rect x="20" y="50" width="2" height="2" fill="#ffffff"/>
  <rect x="34" y="52" width="2" height="2" fill="#ffffff"/>
  <rect x="48" y="50" width="2" height="2" fill="#ffffff"/>
  <!-- constellation (orion-ish) connecting lines suggested by adjacent dots -->
  <rect x="24" y="32" width="2" height="2" fill="#fde68a"/>
  <rect x="32" y="34" width="2" height="2" fill="#fde68a"/>
  <rect x="40" y="34" width="2" height="2" fill="#fde68a"/>
  <rect x="28" y="38" width="2" height="2" fill="#fde68a"/>
  <rect x="36" y="38" width="2" height="2" fill="#fde68a"/>
  <rect x="32" y="42" width="2" height="2" fill="#fde68a"/>
  <!-- shooting star -->
  <rect x="44" y="18" width="6" height="2" fill="#ffffff"/>
  <rect x="50" y="20" width="2" height="2" fill="#ffffff"/>
  <!-- telescope silhouette bottom right -->
  <rect x="58" y="58" width="10" height="3"  fill="#1a1a1a"/>
  <rect x="60" y="56" width="8"  height="2"  fill="#1a1a1a"/>
  <rect x="62" y="54" width="6"  height="2"  fill="#1a1a1a"/>
  <rect x="62" y="61" width="2"  height="10" fill="#1a1a1a"/>
  <rect x="58" y="71" width="10" height="2"  fill="#1a1a1a"/>
  <rect x="56" y="73" width="14" height="3"  fill="#1a1a1a"/>
</svg>
