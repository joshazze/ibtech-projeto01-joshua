<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" shape-rendering="crispEdges" width="240" height="288">
  <title>Polaroide pixelada de uma pilha de livros com lombadas coloridas e óculos sobre eles.</title>
  <!-- frame -->
  <rect width="80" height="96" fill="#f5ecd9"/>
  <rect x="4" y="4" width="72" height="72" fill="#1a0e08"/>
  <!-- wall (dim) -->
  <rect x="4" y="4" width="72" height="72" fill="#5a3a22"/>
  <!-- shelf surface -->
  <rect x="4" y="68" width="72" height="8" fill="#3d2817"/>
  <rect x="4" y="68" width="72" height="2" fill="#5c4a30"/>
  <!-- stacked books (horizontal) -->
  <!-- bottom large book -->
  <rect x="14" y="60" width="56" height="8" fill="#7c2d12"/>
  <rect x="14" y="60" width="56" height="2" fill="#9c3d22"/>
  <rect x="14" y="66" width="56" height="2" fill="#5c1d0a"/>
  <rect x="20" y="62" width="20" height="2" fill="#fde68a"/>
  <rect x="50" y="63" width="14" height="3" fill="#fde68a"/>
  <!-- next book -->
  <rect x="18" y="52" width="48" height="8" fill="#1e3a8a"/>
  <rect x="18" y="52" width="48" height="2" fill="#3b5bb5"/>
  <rect x="18" y="58" width="48" height="2" fill="#0a1f5e"/>
  <rect x="22" y="54" width="16" height="2" fill="#fde68a"/>
  <rect x="42" y="55" width="20" height="3" fill="#fde68a"/>
  <!-- next book -->
  <rect x="16" y="44" width="52" height="8" fill="#16a34a"/>
  <rect x="16" y="44" width="52" height="2" fill="#22c55e"/>
  <rect x="16" y="50" width="52" height="2" fill="#0e7234"/>
  <rect x="20" y="46" width="22" height="2" fill="#fde68a"/>
  <rect x="46" y="47" width="18" height="3" fill="#fde68a"/>
  <!-- top book (small, vertical leaning) -->
  <rect x="22" y="32" width="44" height="12" fill="#facc15"/>
  <rect x="22" y="32" width="44" height="2"  fill="#fde047"/>
  <rect x="22" y="42" width="44" height="2"  fill="#a16207"/>
  <rect x="26" y="34" width="20" height="2"  fill="#1a0e08"/>
  <rect x="50" y="36" width="14" height="3"  fill="#1a0e08"/>
  <rect x="26" y="38" width="26" height="2"  fill="#1a0e08"/>
  <!-- bookmark hanging -->
  <rect x="30" y="38" width="2" height="10" fill="#dc2626"/>
  <!-- glasses on top -->
  <rect x="30" y="22" width="6" height="6" fill="none" stroke="#1a0e08" stroke-width="2"/>
  <rect x="44" y="22" width="6" height="6" fill="none" stroke="#1a0e08" stroke-width="2"/>
  <rect x="36" y="24" width="8" height="2" fill="#1a0e08"/>
  <rect x="28" y="24" width="2" height="2" fill="#1a0e08"/>
  <rect x="50" y="24" width="2" height="2" fill="#1a0e08"/>
  <!-- tiny letter on side (curiosity touch) -->
  <rect x="6" y="52" width="6" height="14" fill="#f5ecd9"/>
  <rect x="6" y="52" width="6" height="2"  fill="#1a0e08"/>
  <rect x="7" y="55" width="4" height="1"  fill="#1a0e08"/>
  <rect x="7" y="57" width="3" height="1"  fill="#1a0e08"/>
  <rect x="7" y="59" width="4" height="1"  fill="#1a0e08"/>
</svg>
