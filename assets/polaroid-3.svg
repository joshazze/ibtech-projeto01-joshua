<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" shape-rendering="crispEdges" width="240" height="288">
  <title>Polaroide pixelada de uma trilha de montanha com mochila e bastão de caminhada ao amanhecer.</title>
  <!-- polaroid frame -->
  <rect width="80" height="96" fill="#f5ecd9"/>
  <rect x="4" y="4" width="72" height="72" fill="#1a0e08"/>
  <!-- sunrise sky -->
  <rect x="4" y="4" width="72" height="14" fill="#fcd34d"/>
  <rect x="4" y="14" width="72" height="6" fill="#fb923c"/>
  <rect x="4" y="20" width="72" height="6" fill="#c2410c"/>
  <!-- sun on horizon -->
  <rect x="50" y="12" width="14" height="8" fill="#fde68a"/>
  <rect x="48" y="14" width="2" height="4" fill="#fde68a"/>
  <rect x="64" y="14" width="2" height="4" fill="#fde68a"/>
  <!-- distant mountain layers -->
  <polygon points="4,32 18,22 30,32" fill="#5e6472"/>
  <polygon points="22,34 38,20 56,34" fill="#4a5061"/>
  <polygon points="48,34 64,18 76,34" fill="#3a3f4d"/>
  <!-- snow caps -->
  <polygon points="35,24 38,20 41,24" fill="#f5ecd9"/>
  <polygon points="61,22 64,18 67,22" fill="#f5ecd9"/>
  <!-- mid trees on hills -->
  <rect x="10" y="28" width="2" height="4" fill="#15803d"/>
  <polygon points="8,32 11,24 14,32" fill="#15803d"/>
  <rect x="68" y="28" width="2" height="4" fill="#15803d"/>
  <polygon points="66,32 69,24 72,32" fill="#15803d"/>
  <!-- foreground trail -->
  <rect x="4" y="34" width="72" height="42" fill="#3d6b3d"/>
  <rect x="4" y="34" width="72" height="3" fill="#4f8a4f"/>
  <!-- trail (winding path) -->
  <polygon points="34,76 46,76 40,40 38,40" fill="#a89a78"/>
  <rect x="36" y="44" width="6" height="2" fill="#5c4a30"/>
  <rect x="34" y="56" width="10" height="2" fill="#5c4a30"/>
  <rect x="34" y="68" width="12" height="2" fill="#5c4a30"/>
  <!-- pine trees flanking trail -->
  <polygon points="14,50 20,38 26,50" fill="#15803d"/>
  <rect x="18" y="50" width="4" height="6" fill="#3d2817"/>
  <polygon points="56,52 60,42 64,52" fill="#15803d"/>
  <rect x="59" y="52" width="2" height="4" fill="#3d2817"/>
  <polygon points="6,62 10,52 14,62" fill="#15803d"/>
  <rect x="9" y="62" width="2" height="4" fill="#3d2817"/>
  <polygon points="66,62 70,52 74,62" fill="#15803d"/>
  <rect x="69" y="62" width="2" height="4" fill="#3d2817"/>
  <!-- backpack on the ground at trailhead -->
  <rect x="50" y="60" width="10" height="14" fill="#7c2d12"/>
  <rect x="50" y="60" width="10" height="2"  fill="#5c1d0a"/>
  <rect x="52" y="62" width="6"  height="4"  fill="#5c1d0a"/>
  <rect x="48" y="62" width="2"  height="6"  fill="#5c1d0a"/>
  <rect x="60" y="62" width="2"  height="6"  fill="#5c1d0a"/>
  <!-- walking stick -->
  <rect x="46" y="56" width="2" height="20" fill="#3d2817"/>
  <rect x="44" y="54" width="6" height="2"  fill="#5c4a30"/>
  <!-- caption -->
  <text x="40" y="88" font-family="monospace" font-size="6" fill="#2b1810" text-anchor="middle">SUNRISE TRAIL</text>
</svg>
