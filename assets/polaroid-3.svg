<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" shape-rendering="crispEdges" width="240" height="288">
  <title>Foto polaroide pixelada de uma vila italiana com bandeira tricolor</title>
  <!-- polaroid frame -->
  <rect width="80" height="96" fill="#f5ecd9"/>
  <rect x="4" y="4" width="72" height="72" fill="#fef3c7"/>
  <!-- sky -->
  <rect x="4" y="4" width="72" height="22" fill="#fcd34d"/>
  <rect x="4" y="20" width="72" height="6" fill="#fbbf24"/>
  <!-- distant hills -->
  <polygon points="4,40 24,26 44,40" fill="#86c084"/>
  <polygon points="36,42 56,28 76,42" fill="#86c084"/>
  <!-- foreground ground -->
  <rect x="4" y="40" width="72" height="36" fill="#d97706"/>
  <rect x="4" y="40" width="72" height="3" fill="#f59e0b"/>
  <!-- house body -->
  <rect x="22" y="36" width="22" height="24" fill="#fef3c7"/>
  <rect x="22" y="36" width="22" height="2" fill="#fde68a"/>
  <!-- roof terracotta -->
  <polygon points="20,38 33,26 46,38" fill="#b91c1c"/>
  <polygon points="20,38 33,32 46,38" fill="#7f1d1d"/>
  <!-- door -->
  <rect x="30" y="48" width="6" height="12" fill="#5a3a22"/>
  <rect x="34" y="54" width="1" height="1" fill="#fde68a"/>
  <!-- windows -->
  <rect x="24" y="42" width="4" height="4" fill="#1e3a8a"/>
  <rect x="38" y="42" width="4" height="4" fill="#1e3a8a"/>
  <!-- italian flag pole -->
  <rect x="50" y="28" width="1" height="14" fill="#2b1810"/>
  <rect x="51" y="28" width="3" height="6" fill="#16a34a"/>
  <rect x="54" y="28" width="3" height="6" fill="#f5ecd9"/>
  <rect x="57" y="28" width="3" height="6" fill="#dc2626"/>
  <!-- cypress trees -->
  <rect x="14" y="46" width="3" height="14" fill="#15803d"/>
  <polygon points="14,46 15.5,36 17,46" fill="#15803d"/>
  <rect x="60" y="48" width="3" height="12" fill="#15803d"/>
  <polygon points="60,48 61.5,40 63,48" fill="#15803d"/>
  <!-- caption -->
  <text x="40" y="88" font-family="monospace" font-size="6" fill="#2b1810" text-anchor="middle">TORINO · 2020-24</text>
</svg>
