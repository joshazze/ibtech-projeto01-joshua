<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" shape-rendering="crispEdges" width="240" height="288">
  <title>Polaroide pixelada de um toca-discos retrô com vinil girando.</title>
  <!-- frame -->
  <rect width="80" height="96" fill="#f5ecd9"/>
  <rect x="4" y="4" width="72" height="72" fill="#1a0e08"/>
  <!-- wood backdrop -->
  <rect x="4" y="4" width="72" height="72" fill="#3d2817"/>
  <rect x="4" y="20" width="72" height="2" fill="#2b1810"/>
  <rect x="4" y="40" width="72" height="2" fill="#2b1810"/>
  <rect x="4" y="60" width="72" height="2" fill="#2b1810"/>
  <!-- turntable wooden base -->
  <rect x="6" y="42" width="68" height="32" fill="#5c4a30"/>
  <rect x="6" y="42" width="68" height="2"  fill="#7a6440"/>
  <rect x="6" y="72" width="68" height="2"  fill="#3d2817"/>
  <!-- platter (top mat) -->
  <rect x="14" y="46" width="52" height="22" fill="#1a0e08"/>
  <rect x="14" y="46" width="52" height="2"  fill="#3a2418"/>
  <!-- vinyl record (circular feel via rects) -->
  <rect x="20" y="48" width="40" height="2"  fill="#0a0a0a"/>
  <rect x="18" y="50" width="44" height="2"  fill="#0a0a0a"/>
  <rect x="16" y="52" width="48" height="12" fill="#0a0a0a"/>
  <rect x="18" y="64" width="44" height="2"  fill="#0a0a0a"/>
  <rect x="20" y="66" width="40" height="2"  fill="#0a0a0a"/>
  <!-- record grooves (lighter rings) -->
  <rect x="20" y="54" width="40" height="1" fill="#2a2a2a"/>
  <rect x="20" y="58" width="40" height="1" fill="#2a2a2a"/>
  <rect x="20" y="62" width="40" height="1" fill="#2a2a2a"/>
  <!-- center label (red) -->
  <rect x="34" y="54" width="12" height="8" fill="#dc2626"/>
  <rect x="36" y="56" width="8"  height="4" fill="#fde68a"/>
  <rect x="39" y="58" width="2"  height="2" fill="#1a0e08"/>
  <!-- tonearm -->
  <rect x="64" y="38" width="6"  height="6"  fill="#9ca3af"/>
  <rect x="66" y="40" width="2"  height="2"  fill="#facc15"/>
  <rect x="60" y="44" width="2"  height="14" fill="#9ca3af"/>
  <rect x="58" y="56" width="6"  height="3"  fill="#9ca3af"/>
  <rect x="56" y="58" width="3"  height="2"  fill="#1a0e08"/>
  <!-- pitch slider -->
  <rect x="10" y="64" width="14" height="3" fill="#3a3a3a"/>
  <rect x="14" y="63" width="3"  height="5" fill="#facc15"/>
  <!-- speaker grille (small left) -->
  <rect x="8" y="46" width="4" height="14" fill="#2a2a2a"/>
  <rect x="9" y="48" width="2" height="2"  fill="#5a5a5a"/>
  <rect x="9" y="52" width="2" height="2"  fill="#5a5a5a"/>
  <rect x="9" y="56" width="2" height="2"  fill="#5a5a5a"/>
  <!-- music notes floating -->
  <rect x="22" y="20" width="2" height="6" fill="#facc15"/>
  <rect x="20" y="26" width="4" height="2" fill="#facc15"/>
  <rect x="44" y="14" width="2" height="6" fill="#facc15"/>
  <rect x="42" y="20" width="4" height="2" fill="#facc15"/>
  <rect x="58" y="22" width="2" height="6" fill="#facc15"/>
  <rect x="56" y="28" width="4" height="2" fill="#facc15"/>
</svg>
