<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" shape-rendering="crispEdges" width="240" height="288">
  <title>Polaroide pixelada de uma cafeteira italiana moka com vapor saindo.</title>
  <!-- polaroid frame -->
  <rect width="80" height="96" fill="#f5ecd9"/>
  <rect x="4" y="4" width="72" height="72" fill="#1a0e08"/>
  <!-- counter / wood surface -->
  <rect x="4" y="56" width="72" height="20" fill="#3d2817"/>
  <rect x="4" y="56" width="72" height="2" fill="#5a3a22"/>
  <!-- background warm -->
  <rect x="4" y="4" width="72" height="52" fill="#2b1810"/>
  <!-- steam wisps -->
  <rect x="36" y="10" width="2" height="2" fill="#d4c8a8" opacity="0.7"/>
  <rect x="38" y="8"  width="2" height="2" fill="#d4c8a8" opacity="0.5"/>
  <rect x="42" y="6"  width="2" height="2" fill="#d4c8a8" opacity="0.4"/>
  <rect x="44" y="4"  width="2" height="2" fill="#d4c8a8" opacity="0.3"/>
  <rect x="32" y="14" width="2" height="2" fill="#d4c8a8" opacity="0.5"/>
  <rect x="46" y="12" width="2" height="2" fill="#d4c8a8" opacity="0.5"/>
  <!-- moka top chamber -->
  <rect x="30" y="22" width="20" height="4"  fill="#6b6b6b"/>
  <rect x="30" y="26" width="20" height="14" fill="#8a8a8a"/>
  <rect x="32" y="26" width="2"  height="14" fill="#a0a0a0"/>
  <rect x="46" y="26" width="2"  height="14" fill="#5a5a5a"/>
  <!-- knob on top -->
  <rect x="38" y="18" width="4" height="4" fill="#1a0e08"/>
  <rect x="36" y="20" width="8" height="2" fill="#1a0e08"/>
  <!-- pour spout -->
  <rect x="50" y="28" width="4" height="2" fill="#6b6b6b"/>
  <rect x="50" y="30" width="4" height="2" fill="#8a8a8a"/>
  <!-- middle band (separator) -->
  <rect x="28" y="40" width="24" height="2" fill="#1a0e08"/>
  <!-- bottom chamber (wider) -->
  <rect x="28" y="42" width="24" height="14" fill="#8a8a8a"/>
  <rect x="28" y="42" width="2"  height="14" fill="#a0a0a0"/>
  <rect x="50" y="42" width="2"  height="14" fill="#5a5a5a"/>
  <!-- handle -->
  <rect x="52" y="42" width="2"  height="14" fill="#1a0e08"/>
  <rect x="54" y="42" width="6"  height="3"  fill="#1a0e08"/>
  <rect x="54" y="53" width="6"  height="3"  fill="#1a0e08"/>
  <rect x="58" y="44" width="2"  height="11" fill="#1a0e08"/>
  <!-- cup beside it (espresso) -->
  <rect x="14" y="46" width="10" height="8" fill="#f5ecd9"/>
  <rect x="14" y="46" width="10" height="2" fill="#5a3a22"/>
  <!-- cup handle -->
  <rect x="24" y="48" width="2" height="4" fill="#f5ecd9"/>
  <!-- tiny coffee steam -->
  <rect x="17" y="42" width="2" height="2" fill="#d4c8a8" opacity="0.6"/>
  <rect x="20" y="40" width="2" height="2" fill="#d4c8a8" opacity="0.4"/>
  <!-- caption -->
  <text x="40" y="88" font-family="monospace" font-size="6" fill="#2b1810" text-anchor="middle">UN CAFFÈ, GRAZIE</text>
</svg>
