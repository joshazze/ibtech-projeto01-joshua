<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" shape-rendering="crispEdges" width="240" height="288">
  <title>Polaroide pixelada de um controle de videogame retrô estilo NES.</title>
  <!-- polaroid frame -->
  <rect width="80" height="96" fill="#f5ecd9"/>
  <rect x="4" y="4" width="72" height="72" fill="#7c2d12"/>
  <!-- subtle background bricks -->
  <rect x="4" y="20" width="72" height="2" fill="#5c1d0a"/>
  <rect x="4" y="36" width="72" height="2" fill="#5c1d0a"/>
  <rect x="4" y="52" width="72" height="2" fill="#5c1d0a"/>
  <rect x="4" y="68" width="72" height="2" fill="#5c1d0a"/>
  <!-- "1UP" pixel coin top right -->
  <rect x="60" y="10" width="8" height="8" fill="#facc15"/>
  <rect x="62" y="12" width="4" height="4" fill="#a16207"/>
  <rect x="63" y="13" width="2" height="2" fill="#facc15"/>
  <!-- mushroom top left (nostalgia) -->
  <rect x="10" y="12" width="8" height="6" fill="#dc2626"/>
  <rect x="12" y="10" width="4" height="2" fill="#dc2626"/>
  <rect x="12" y="14" width="2" height="2" fill="#f5ecd9"/>
  <rect x="16" y="14" width="2" height="2" fill="#f5ecd9"/>
  <rect x="10" y="18" width="8" height="4" fill="#f5ecd9"/>
  <rect x="12" y="20" width="2" height="2" fill="#1a0e08"/>
  <rect x="14" y="20" width="2" height="2" fill="#1a0e08"/>
  <!-- controller body -->
  <rect x="14" y="36" width="52" height="22" fill="#d4c8a8"/>
  <rect x="14" y="36" width="52" height="2"  fill="#a89a78"/>
  <rect x="14" y="56" width="52" height="2"  fill="#5c4a30"/>
  <rect x="14" y="36" width="2"  height="22" fill="#a89a78"/>
  <rect x="64" y="36" width="2"  height="22" fill="#5c4a30"/>
  <!-- d-pad cross -->
  <rect x="20" y="42" width="10" height="4" fill="#1a0e08"/>
  <rect x="23" y="39" width="4"  height="10" fill="#1a0e08"/>
  <rect x="24" y="40" width="2"  height="2"  fill="#5a5a5a"/>
  <!-- select / start (small dark bars) -->
  <rect x="34" y="48" width="6" height="2" fill="#5c4a30"/>
  <rect x="42" y="48" width="6" height="2" fill="#5c4a30"/>
  <rect x="34" y="46" width="6" height="2" fill="#5a5a5a"/>
  <rect x="42" y="46" width="6" height="2" fill="#5a5a5a"/>
  <!-- A and B buttons -->
  <rect x="52" y="42" width="6" height="6" fill="#dc2626"/>
  <rect x="58" y="44" width="6" height="6" fill="#dc2626"/>
  <text x="55" y="47" font-family="monospace" font-size="4" fill="#f5ecd9" text-anchor="middle">B</text>
  <text x="61" y="49" font-family="monospace" font-size="4" fill="#f5ecd9" text-anchor="middle">A</text>
  <!-- cable -->
  <rect x="38" y="58" width="4" height="14" fill="#3d2817"/>
  <rect x="34" y="62" width="4" height="2"  fill="#3d2817"/>
  <rect x="42" y="66" width="4" height="2"  fill="#3d2817"/>
  <!-- caption -->
  <text x="40" y="88" font-family="monospace" font-size="6" fill="#2b1810" text-anchor="middle">PRESS START</text>
</svg>
