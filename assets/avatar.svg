<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="128" height="128">
  <title>Avatar pixelado de Joshua Azze Distel</title>
  <!-- background -->
  <rect width="32" height="32" fill="#3d2817"/>
  <!-- hair back -->
  <rect x="9" y="6" width="14" height="3" fill="#3a2418"/>
  <!-- face -->
  <rect x="10" y="9" width="12" height="11" fill="#f4c69a"/>
  <!-- hair front -->
  <rect x="9" y="8" width="14" height="3" fill="#3a2418"/>
  <rect x="9" y="11" width="2" height="2" fill="#3a2418"/>
  <rect x="21" y="11" width="2" height="2" fill="#3a2418"/>
  <!-- ears -->
  <rect x="9" y="13" width="1" height="3" fill="#e0a878"/>
  <rect x="22" y="13" width="1" height="3" fill="#e0a878"/>
  <!-- eyes -->
  <rect x="12" y="13" width="2" height="2" fill="#2b1810"/>
  <rect x="18" y="13" width="2" height="2" fill="#2b1810"/>
  <rect x="13" y="13" width="1" height="1" fill="#7ec8e3"/>
  <rect x="19" y="13" width="1" height="1" fill="#7ec8e3"/>
  <!-- nose -->
  <rect x="15" y="16" width="2" height="1" fill="#d99a6c"/>
  <!-- mouth -->
  <rect x="14" y="18" width="4" height="1" fill="#8b3a3a"/>
  <!-- neck -->
  <rect x="13" y="20" width="6" height="2" fill="#e0a878"/>
  <!-- shirt -->
  <rect x="8" y="22" width="16" height="10" fill="#1e3a8a"/>
  <rect x="13" y="22" width="6" height="2" fill="#0a1a2e"/>
  <!-- shirt detail (collar) -->
  <rect x="15" y="23" width="2" height="2" fill="#f5ecd9"/>
</svg>
